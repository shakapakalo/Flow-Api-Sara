kind = "web"
previewPath = "/"
title = "Flow2API Image Tester"
version = "1.0.0"
id = "artifacts/image-tester"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18990

[services.development]
run = "pnpm --filter @workspace/image-tester run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/image-tester", "run", "build" ]
publicDir = "artifacts/image-tester/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18990"
BASE_PATH = "/"
