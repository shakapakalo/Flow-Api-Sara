<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text-to-Image Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: #0d0f1a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.header {
  padding: 18px 24px;
  border-bottom: 1px solid #1e2235;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header h1 { font-size: 17px; font-weight: 600; color: #f1f5f9; }
.header p { font-size: 12px; color: #64748b; }

.main { flex: 1; display: flex; gap: 0; }

.sidebar {
  width: 260px;
  border-right: 1px solid #1e2235;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
}

.label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

select, input[type="text"], textarea {
  width: 100%;
  background: #131624;
  border: 1px solid #1e2235;
  border-radius: 8px;
  color: #e2e8f0;
  font-size: 13px;
  padding: 8px 10px;
  outline: none;
  transition: border-color 0.15s;
}
select:focus, input:focus, textarea:focus { border-color: #6366f1; }
select { cursor: pointer; }
select option { background: #131624; }

.section { display: flex; flex-direction: column; }

textarea {
  resize: none;
  min-height: 60px;
  font-family: inherit;
}

.api-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.api-row input { flex: 1; font-family: monospace; font-size: 12px; }

.content {
  flex: 1;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.prompt-area {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.prompt-area textarea {
  min-height: 80px;
  font-size: 14px;
  line-height: 1.5;
}

.actions { display: flex; gap: 10px; align-items: center; }

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.btn-primary {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  box-shadow: 0 2px 12px rgba(99,102,241,0.3);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.btn-secondary {
  background: #1e2235;
  color: #94a3b8;
  border: 1px solid #2d3450;
}
.btn-secondary:hover { background: #252a42; color: #e2e8f0; }

.status { font-size: 13px; color: #64748b; }
.status.loading { color: #8b5cf6; }
.status.error { color: #f87171; }
.status.success { color: #34d399; }

.result-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.image-container {
  background: #0a0c17;
  border: 1px solid #1e2235;
  border-radius: 12px;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  flex: 1;
}

.image-placeholder {
  text-align: center;
  color: #334155;
}
.image-placeholder svg { width: 48px; height: 48px; margin-bottom: 12px; display: block; margin: 0 auto 12px; }
.image-placeholder p { font-size: 14px; }

.generated-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}

.spinner {
  width: 32px; height: 32px;
  border: 3px solid #1e2235;
  border-top-color: #6366f1;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-state { text-align: center; color: #64748b; }
.loading-state p { font-size: 13px; margin-top: 4px; }

.img-info {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: #0f1221;
  border-radius: 8px;
  border: 1px solid #1e2235;
}
.img-info-left { font-size: 12px; color: #64748b; }
.img-info-model { font-weight: 500; color: #8b5cf6; }
.img-info-time { color: #94a3b8; }

.download-btn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 6px;
  background: #1e2235;
  border: 1px solid #2d3450;
  color: #94a3b8;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
}
.download-btn:hover { background: #252a42; color: #e2e8f0; }

.examples { display: flex; flex-wrap: wrap; gap: 6px; }
.example-chip {
  font-size: 12px;
  padding: 4px 10px;
  background: #131624;
  border: 1px solid #1e2235;
  border-radius: 20px;
  color: #64748b;
  cursor: pointer;
  transition: all 0.15s;
}
.example-chip:hover { border-color: #6366f1; color: #a5b4fc; background: #1a1d2e; }

.progress-bar {
  height: 2px;
  background: #1e2235;
  border-radius: 1px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  width: 0%;
  transition: width 0.3s;
  border-radius: 1px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🎨</div>
  <div>
    <h1>Text-to-Image</h1>
    <p>Powered by Google Flow via Flow2API</p>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="section">
      <div class="label">API Key</div>
      <div class="api-row">
        <input type="text" id="apiKey" value="han1234" placeholder="API key..." />
      </div>
    </div>

    <div class="section">
      <div class="label">Model</div>
      <select id="modelSelect">
        <optgroup label="Gemini Flash (Fast)">
          <option value="gemini-2.5-flash-image-landscape">gemini-2.5-flash · Landscape</option>
          <option value="gemini-2.5-flash-image-portrait">gemini-2.5-flash · Portrait</option>
        </optgroup>
        <optgroup label="Gemini 3.0 Pro (Quality)">
          <option value="gemini-3.0-pro-image-landscape" selected>gemini-3.0-pro · Landscape</option>
          <option value="gemini-3.0-pro-image-portrait">gemini-3.0-pro · Portrait</option>
          <option value="gemini-3.0-pro-image-square">gemini-3.0-pro · Square</option>
          <option value="gemini-3.0-pro-image-landscape-2k">gemini-3.0-pro · Landscape 2K</option>
          <option value="gemini-3.0-pro-image-portrait-2k">gemini-3.0-pro · Portrait 2K</option>
          <option value="gemini-3.0-pro-image-square-2k">gemini-3.0-pro · Square 2K</option>
          <option value="gemini-3.0-pro-image-landscape-4k">gemini-3.0-pro · Landscape 4K</option>
          <option value="gemini-3.0-pro-image-portrait-4k">gemini-3.0-pro · Portrait 4K</option>
        </optgroup>
        <optgroup label="Gemini 3.1 Flash (Latest)">
          <option value="gemini-3.1-flash-image-landscape">gemini-3.1-flash · Landscape</option>
          <option value="gemini-3.1-flash-image-portrait">gemini-3.1-flash · Portrait</option>
          <option value="gemini-3.1-flash-image-square">gemini-3.1-flash · Square</option>
          <option value="gemini-3.1-flash-image-landscape-2k">gemini-3.1-flash · Landscape 2K</option>
          <option value="gemini-3.1-flash-image-portrait-2k">gemini-3.1-flash · Portrait 2K</option>
        </optgroup>
        <optgroup label="Imagen 4">
          <option value="imagen-4.0-generate-preview-landscape">imagen-4.0 · Landscape</option>
          <option value="imagen-4.0-generate-preview-portrait">imagen-4.0 · Portrait</option>
        </optgroup>
      </select>
    </div>

    <div class="section">
      <div class="label">Examples</div>
      <div class="examples">
        <span class="example-chip" onclick="setPrompt('A cyberpunk city at night with neon lights and rain')">Cyberpunk city</span>
        <span class="example-chip" onclick="setPrompt('A majestic mountain landscape at golden hour, photorealistic')">Mountain</span>
        <span class="example-chip" onclick="setPrompt('An astronaut floating in deep space, surrounded by colorful nebulae')">Astronaut</span>
        <span class="example-chip" onclick="setPrompt('A cozy coffee shop interior with warm lighting and books')">Coffee shop</span>
        <span class="example-chip" onclick="setPrompt('A dragon made of crystalline ice flying over a frozen ocean')">Ice dragon</span>
        <span class="example-chip" onclick="setPrompt('Portrait of a fox wearing a Victorian suit, oil painting style')">Fox portrait</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="prompt-area">
      <div class="label">Prompt</div>
      <textarea id="prompt" placeholder="Describe the image you want to generate... e.g. 'A beautiful sunset over the ocean with dramatic clouds, photorealistic'"></textarea>
      <div class="actions">
        <button class="btn btn-primary" id="generateBtn" onclick="generate()">
          <span id="btnIcon">✨</span>
          <span id="btnText">Generate</span>
        </button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
        <span class="status" id="statusMsg"></span>
      </div>
    </div>

    <div class="progress-bar" id="progressBar" style="display:none">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="result-area">
      <div class="image-container" id="imgContainer">
        <div class="image-placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <path d="M21 15l-5-5L5 21"/>
          </svg>
          <p>Your generated image will appear here</p>
        </div>
      </div>
      <div id="imgMeta" style="display:none">
        <div class="img-info">
          <div class="img-info-left">
            <span class="img-info-model" id="metaModel"></span>
            <span class="img-info-time" id="metaTime"></span>
          </div>
          <a class="download-btn" id="downloadBtn" href="#" download="generated.png">⬇ Download</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_URL = window.location.origin;
let currentImageUrl = null;

function setPrompt(text) {
  document.getElementById('prompt').value = text;
}

function clearAll() {
  document.getElementById('prompt').value = '';
  setStatus('', '');
  document.getElementById('placeholder').style.display = 'block';
  document.getElementById('imgMeta').style.display = 'none';
  const existingImg = document.querySelector('.generated-img');
  if (existingImg) existingImg.remove();
  currentImageUrl = null;
}

function setStatus(msg, type) {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function startProgress() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  bar.style.display = 'block';
  fill.style.width = '0%';
  let pct = 0;
  const interval = setInterval(() => {
    if (pct < 85) {
      pct += Math.random() * 8;
      if (pct > 85) pct = 85;
      fill.style.width = pct + '%';
    }
  }, 800);
  return { interval, fill, bar };
}

function stopProgress(progress, success) {
  clearInterval(progress.interval);
  progress.fill.style.width = success ? '100%' : '0%';
  setTimeout(() => { progress.bar.style.display = 'none'; }, 400);
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  const model = document.getElementById('modelSelect').value;
  const apiKey = document.getElementById('apiKey').value.trim();

  if (!prompt) { setStatus('Enter a prompt first', 'error'); return; }
  if (!apiKey) { setStatus('Enter API key', 'error'); return; }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  document.getElementById('btnText').textContent = 'Generating...';
  document.getElementById('btnIcon').textContent = '⏳';

  // Clear previous
  const existingImg = document.querySelector('.generated-img');
  if (existingImg) existingImg.remove();
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('imgMeta').style.display = 'none';

  // Show loading
  const container = document.getElementById('imgContainer');
  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-state';
  loadingEl.id = 'loadingEl';
  loadingEl.innerHTML = '<div class="spinner"></div><p>Generating with ' + model + '...</p><p style="color:#475569;font-size:11px;margin-top:6px">This may take 15–40 seconds</p>';
  container.appendChild(loadingEl);

  const progress = startProgress();
  const startTime = Date.now();
  setStatus('Sending request...', 'loading');

  try {
    const resp = await fetch(BASE_URL + '/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: model,
        messages: [{ role: 'user', content: prompt }],
        stream: false
      })
    });

    const data = await resp.json();

    if (!resp.ok) {
      throw new Error(data.detail || data.message || 'Generation failed (' + resp.status + ')');
    }

    // Extract image URL from response
    const content = data.choices?.[0]?.message?.content || '';
    const imgMatch = content.match(/!\[.*?\]\((.*?)\)/) || content.match(/https?:\/\/\S+\.(png|jpg|jpeg|webp|gif)/i);
    const imgUrl = imgMatch ? imgMatch[1] || imgMatch[0] : null;

    if (!imgUrl) {
      throw new Error('No image found in response. Content: ' + content.substring(0, 200));
    }

    // Display image
    stopProgress(progress, true);
    loadingEl.remove();

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    const img = document.createElement('img');
    img.className = 'generated-img';
    img.src = imgUrl;
    img.alt = prompt;
    img.onload = () => {
      setStatus('Generated in ' + elapsed + 's', 'success');
    };
    img.onerror = () => {
      setStatus('Image loaded (external URL)', 'success');
    };
    container.appendChild(img);

    currentImageUrl = imgUrl;
    document.getElementById('metaModel').textContent = model + ' · ';
    document.getElementById('metaTime').textContent = elapsed + 's · ' + new Date().toLocaleTimeString();
    document.getElementById('downloadBtn').href = imgUrl;
    document.getElementById('imgMeta').style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';

  } catch (err) {
    stopProgress(progress, false);
    loadingEl.remove();
    document.getElementById('placeholder').style.display = 'block';
    setStatus(err.message, 'error');
    console.error('Error:', err);
  } finally {
    btn.disabled = false;
    document.getElementById('btnText').textContent = 'Generate';
    document.getElementById('btnIcon').textContent = '✨';
  }
}

document.getElementById('prompt').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') generate();
});
</script>
</body>
</html>
