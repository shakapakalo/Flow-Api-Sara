# ============================================================
# Flow by RSA - Nginx Config
# Place this file at: /etc/nginx/sites-available/flowrsa
# Then: ln -s /etc/nginx/sites-available/flowrsa /etc/nginx/sites-enabled/
# Change YOUR_DOMAIN to your actual domain (e.g. flowrsa.com)
# ============================================================

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # --- Frontend (React static build) ---
    root /var/www/flowrsa/artifacts/image-tester/dist;
    index index.html;

    # Increase upload size for image uploads
    client_max_body_size 50M;

    # Increase timeouts for long video generation
    proxy_read_timeout    2100s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    2100s;

    # --- API Server (Node.js on port 3001) ---
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 2100s;
    }

    # --- Flow2API (Python on port 8000) ---
    location /manage {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 2100s;
    }

    location /v1/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 2100s;
    }

    # --- SPA Fallback (React Router) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Static asset caching ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }
}
